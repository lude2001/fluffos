name: CI (Windows)

on:
  push:
    branches: [master]
    paths-ignore: ['docs/**']
  pull_request:
    branches: [master]
    paths-ignore: ['docs/**']

env:
  CTEST_OUTPUT_ON_FAILURE: 1

jobs:
  build-and-test:
    name: ${{ matrix.build }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build: [Debug, RelWithDebInfo]

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-pcre
            mingw-w64-x86_64-icu
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-jemalloc
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-gtest
            bison
            make

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          mkdir build && cd build
          cmake -G "MSYS Makefiles" \
            -DCMAKE_BUILD_TYPE=${{ matrix.build }} \
            -DMARCH_NATIVE=OFF \
            -DPACKAGE_CRYPTO=OFF \
            -DPACKAGE_DB_MYSQL="" \
            -DPACKAGE_DB_SQLITE=1 \
            ..

      - name: Build
        run: cd build && make -j$(nproc) install

      - name: Run Unit Tests
        run: cd build && ctest --output-on-failure -E "PrototypePlaceholder|CapturesRuntimeError|ConcurrentPipeClients"

      - name: Run LPC Testsuite
        continue-on-error: true
        run: cd testsuite && ../build/bin/driver etc/config.test -ftest
