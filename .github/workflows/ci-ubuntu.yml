name: CI (Ubuntu)

on:
  push:
    branches: [master]
    paths-ignore: ['docs/**']
  pull_request:
    branches: [master]
    paths-ignore: ['docs/**']

env:
  CTEST_OUTPUT_ON_FAILURE: 1

jobs:
  build-and-test:
    name: ${{ matrix.compiler }} / ${{ matrix.build }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        build: [Debug, RelWithDebInfo]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential autoconf automake bison expect \
            libmysqlclient-dev libpcre3-dev libpq-dev libsqlite3-dev \
            libssl-dev libtool libz-dev telnet libgtest-dev libjemalloc-dev \
            libicu-dev

      - name: Configure
        env:
          CC: ${{ matrix.compiler }}
          CXX: ${{ matrix.compiler == 'clang' && 'clang++' || 'g++' }}
        run: |
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=${{ matrix.build }} -DPACKAGE_DB_SQLITE=2 ..

      - name: Build
        run: cd build && make -j$(nproc) install

      - name: Run Unit Tests
        run: cd build && make test

      - name: Run LPC Testsuite
        run: cd testsuite && ../build/bin/driver etc/config.test -ftest
