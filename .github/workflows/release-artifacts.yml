name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      target:
        description: Artifact set to build for manual validation
        required: true
        default: all
        type: choice
        options:
          - all
          - windows
          - linux
          - linux-static
          - macos
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CTEST_OUTPUT_ON_FAILURE: 1

jobs:
  windows-artifacts:
    name: Windows installer and runtime
    if: github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'windows'
    runs-on: windows-latest

    steps:
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-zstd
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-pcre
            mingw-w64-x86_64-icu
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-jemalloc
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-libmariadbclient
            bison
            git
            make

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve MSYS2 root
        shell: msys2 {0}
        run: |
          msys2_root="$(cygpath -w /)"
          echo "MSYS2_ROOT=${msys2_root%\\}" >> "$GITHUB_ENV"
          repo_root="$(cygpath -m "$GITHUB_WORKSPACE")"
          git config --global --add safe.directory "$repo_root"
          git -C "$repo_root" status --short

      - name: Build Windows distribution and installer
        shell: cmd
        run: build.cmd

      - name: Resolve artifact version
        id: version
        shell: powershell
        run: |
          $version = .\scripts\get-project-version-from-config.ps1 -ConfigHeaderPath .\build\work\src\config.h
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Package Windows runtime
        shell: powershell
        run: |
          $version = '${{ steps.version.outputs.value }}'
          $runtimeZip = "build\fluffos-$version-windows-x86_64-runtime.zip"
          if (Test-Path -LiteralPath $runtimeZip) {
            Remove-Item -LiteralPath $runtimeZip -Force
          }
          Compress-Archive -Path build\install-image\* -DestinationPath $runtimeZip -Force

      - name: Verify Windows installer configuration
        shell: powershell
        run: .\scripts\test-windows-installer-config.ps1 -InstallerScriptPath .\packaging\windows\fluffos.iss

      - name: Verify Windows install image layout
        shell: powershell
        run: .\scripts\test-install-image-layout.ps1 -InstallImageDir .\build\install-image

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fluffos-windows-artifacts
          path: |
            build/fluffos-*-windows-x86_64-installer.exe
            build/fluffos-*-windows-x86_64-runtime.zip
          if-no-files-found: error
          retention-days: 14

  linux-production:
    name: Linux production runtime
    if: github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'linux'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trust workspace for Git metadata
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential autoconf automake bison expect \
            libmysqlclient-dev libpcre3-dev libpq-dev libsqlite3-dev \
            libssl-dev libtool libz-dev telnet libgtest-dev libjemalloc-dev \
            libicu-dev

      - name: Configure
        run: |
          cmake -S . -B build/release \
            -DCMAKE_BUILD_TYPE=Release \
            -DMARCH_NATIVE=OFF \
            -DPACKAGE_DB_SQLITE=2 \
            -DCMAKE_INSTALL_PREFIX="$PWD/package/fluffos"

      - name: Build and install
        run: cmake --build build/release --target install -j"$(nproc)"

      - name: Package Linux runtime
        run: |
          version="$(sed -n 's/^#define PROJECT_VERSION "fluffos \(.*\)"$/\1/p' build/release/src/config.h)"
          if [ -z "$version" ] || [ "$version" = "-uncommited" ] || [ "$version" = "unknown" ]; then
            date_part="$(git log -1 --date=format:%Y%m%d --format=%cd)"
            upstream_part="$(git log --committer='Yucong Sun' -1 --format=%h || true)"
            head_part="$(git rev-parse --short HEAD)"
            version="$date_part"
            if [ -n "$upstream_part" ]; then
              version="$version-$upstream_part"
            fi
            if [ "$head_part" != "$upstream_part" ]; then
              version="$version-$head_part"
            fi
          fi
          arch="$(uname -m)"
          tar -C package -czf "fluffos-${version}-linux-${arch}.tar.gz" fluffos

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: fluffos-linux-production
          path: fluffos-*-linux-*.tar.gz
          if-no-files-found: error
          retention-days: 14

  linux-static-production:
    name: Linux static production runtime
    if: github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'linux-static'
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:22.04
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    defaults:
      run:
        shell: bash

    steps:
      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            autoconf \
            automake \
            binutils \
            bison \
            build-essential \
            ca-certificates \
            cmake \
            expect \
            file \
            git \
            libgtest-dev \
            libicu-dev \
            libjemalloc-dev \
            libmysqlclient-dev \
            libpcre3-dev \
            libsqlite3-dev \
            libssl-dev \
            libtool \
            libzstd-dev \
            pkg-config \
            telnet \
            zlib1g-dev

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trust workspace for Git metadata
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Verify static dependency archives
        run: |
          required_static_libs=(
            /usr/lib/x86_64-linux-gnu/libmysqlclient.a
            /usr/lib/x86_64-linux-gnu/libsqlite3.a
            /usr/lib/x86_64-linux-gnu/libssl.a
            /usr/lib/x86_64-linux-gnu/libcrypto.a
            /usr/lib/x86_64-linux-gnu/libz.a
            /usr/lib/x86_64-linux-gnu/libzstd.a
            /usr/lib/x86_64-linux-gnu/libjemalloc.a
            /usr/lib/x86_64-linux-gnu/libpcre.a
            /usr/lib/x86_64-linux-gnu/libicuuc.a
            /usr/lib/x86_64-linux-gnu/libicudata.a
          )
          missing=0
          for lib in "${required_static_libs[@]}"; do
            if [ -f "$lib" ]; then
              echo "found static archive: $lib"
            else
              echo "missing static archive: $lib" >&2
              missing=1
            fi
          done
          exit "$missing"

      - name: Configure static runtime
        run: |
          cmake -S . -B build/linux-static \
            -DCMAKE_BUILD_TYPE=Release \
            -DSTATIC=ON \
            -DMARCH_NATIVE=OFF \
            -DPACKAGE_DB=ON \
            -DPACKAGE_DB_MYSQL=1 \
            -DPACKAGE_DB_SQLITE=2 \
            -DPACKAGE_DB_DEFAULT_DB=1 \
            -DMYSQL_EXTRA_LIBRARIES="ssl;crypto;z;zstd;resolv;dl;m;pthread" \
            -DCMAKE_INSTALL_PREFIX="$PWD/package/fluffos"

      - name: Build and install static runtime
        run: cmake --build build/linux-static --target install -j"$(nproc)"

      - name: Run static build tests
        run: |
          cd build/linux-static
          ctest --output-on-failure -E "PrototypePlaceholder|CapturesRuntimeError"

      - name: Run static LPC testsuite
        run: |
          cd testsuite
          ../package/fluffos/bin/driver etc/config.test -ftest

      - name: Run static startup smoke
        run: |
          cd testsuite
          set +e
          timeout 10s ../package/fluffos/bin/driver etc/config.test > ../build/linux-static/startup-smoke.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 124 ]; then
            cat ../build/linux-static/startup-smoke.log
            echo "Expected the driver to stay running until timeout; exit code was $status" >&2
            exit 1
          fi
          cat ../build/linux-static/startup-smoke.log

      - name: Verify static linkage
        run: |
          driver="$PWD/package/fluffos/bin/driver"
          file "$driver" | tee build/linux-static/file-driver.txt
          if ! grep -q "statically linked" build/linux-static/file-driver.txt; then
            echo "driver is not reported as statically linked" >&2
            exit 1
          fi

          readelf -d "$driver" > build/linux-static/readelf-d-driver.txt 2>&1 || true
          cat build/linux-static/readelf-d-driver.txt
          if grep -q "NEEDED" build/linux-static/readelf-d-driver.txt; then
            echo "static driver must not contain dynamic NEEDED entries" >&2
            exit 1
          fi

          set +e
          ldd "$driver" > build/linux-static/ldd-driver.txt 2>&1
          set -e
          cat build/linux-static/ldd-driver.txt
          if ! grep -Eq "not a dynamic executable|statically linked" build/linux-static/ldd-driver.txt; then
            echo "ldd did not report a static executable" >&2
            exit 1
          fi

      - name: Package Linux static runtime
        run: |
          version="$(sed -n 's/^#define PROJECT_VERSION "fluffos \(.*\)"$/\1/p' build/linux-static/src/config.h)"
          if [ -z "$version" ] || [ "$version" = "-uncommited" ] || [ "$version" = "unknown" ]; then
            date_part="$(git log -1 --date=format:%Y%m%d --format=%cd)"
            upstream_part="$(git log --committer='Yucong Sun' -1 --format=%h || true)"
            head_part="$(git rev-parse --short HEAD)"
            version="$date_part"
            if [ -n "$upstream_part" ]; then
              version="$version-$upstream_part"
            fi
            if [ "$head_part" != "$upstream_part" ]; then
              version="$version-$head_part"
            fi
          fi
          tarball="fluffos-${version}-linux-x86_64-static.tar.gz"
          tar -C package -czf "$tarball" fluffos
          sha256sum "$tarball" > "$tarball.sha256"
          cat "$tarball.sha256"

      - name: Upload Linux static artifact
        uses: actions/upload-artifact@v4
        with:
          name: fluffos-linux-static-production
          path: |
            fluffos-*-linux-x86_64-static.tar.gz
            fluffos-*-linux-x86_64-static.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14

  macos-production:
    name: macOS production runtime
    if: github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'macos'
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trust workspace for Git metadata
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install dependencies
        env:
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1
        run: |
          brew install cmake pkg-config pcre libgcrypt openssl jemalloc icu4c \
            mysql sqlite3 googletest

      - name: Configure
        env:
          OPENSSL_ROOT_DIR: /opt/homebrew/opt/openssl@3
          ICU_ROOT: /opt/homebrew/opt/icu4c
        run: |
          cmake -S . -B build/release \
            -DCMAKE_BUILD_TYPE=Release \
            -DMARCH_NATIVE=OFF \
            -DPACKAGE_DB_SQLITE=2 \
            -DCMAKE_INSTALL_PREFIX="$PWD/package/fluffos"

      - name: Build and install
        env:
          OPENSSL_ROOT_DIR: /opt/homebrew/opt/openssl@3
          ICU_ROOT: /opt/homebrew/opt/icu4c
        run: cmake --build build/release --target install -j"$(sysctl -n hw.ncpu)"

      - name: Package macOS runtime
        run: |
          version="$(sed -n 's/^#define PROJECT_VERSION "fluffos \(.*\)"$/\1/p' build/release/src/config.h)"
          if [ -z "$version" ] || [ "$version" = "-uncommited" ] || [ "$version" = "unknown" ]; then
            date_part="$(git log -1 --date=format:%Y%m%d --format=%cd)"
            upstream_part="$(git log --committer='Yucong Sun' -1 --format=%h || true)"
            head_part="$(git rev-parse --short HEAD)"
            version="$date_part"
            if [ -n "$upstream_part" ]; then
              version="$version-$upstream_part"
            fi
            if [ "$head_part" != "$upstream_part" ]; then
              version="$version-$head_part"
            fi
          fi
          arch="$(uname -m)"
          tar -C package -czf "fluffos-${version}-macos-${arch}.tar.gz" fluffos

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: fluffos-macos-production
          path: fluffos-*-macos-*.tar.gz
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish GitHub Release assets
    runs-on: ubuntu-24.04
    needs:
      - windows-artifacts
      - linux-production
      - linux-static-production
      - macos-production
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_TAG" \
              --notes "Automated FluffOS release artifacts for $GITHUB_SHA"
          fi
